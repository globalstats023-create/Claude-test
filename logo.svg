<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <!-- Gold gradient principal -->
    <linearGradient id="goldMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="30%" stop-color="#f0c040"/>
      <stop offset="50%" stop-color="#ffe88a"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <!-- Gold gradient secondaire -->
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a08030"/>
      <stop offset="50%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6e2a"/>
    </linearGradient>
    <!-- Gold pour les bâtiments -->
    <linearGradient id="goldBuilding" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#8a6e2a"/>
      <stop offset="40%" stop-color="#c9a84c"/>
      <stop offset="70%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#f0c040"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Glow subtil -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Buildings silhouette -->
  <g transform="translate(210, 60)" filter="url(#shadow)">
    <!-- Building gauche -->
    <rect x="0" y="80" width="32" height="100" fill="url(#goldBuilding)" opacity="0.7"/>
    <rect x="4" y="88" width="8" height="10" rx="1" fill="rgba(255,220,100,0.3)"/>
    <rect x="16" y="88" width="8" height="10" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="4" y="104" width="8" height="10" rx="1" fill="rgba(255,220,100,0.2)"/>
    <rect x="16" y="104" width="8" height="10" rx="1" fill="rgba(255,220,100,0.35)"/>
    <rect x="4" y="120" width="8" height="10" rx="1" fill="rgba(255,220,100,0.3)"/>
    <rect x="16" y="120" width="8" height="10" rx="1" fill="rgba(255,220,100,0.2)"/>
    <rect x="4" y="136" width="8" height="10" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="16" y="136" width="8" height="10" rx="1" fill="rgba(255,220,100,0.25)"/>

    <!-- Building centre (le plus haut) -->
    <rect x="38" y="30" width="44" height="150" fill="url(#goldBuilding)" opacity="0.85"/>
    <rect x="43" y="40" width="10" height="12" rx="1" fill="rgba(255,220,100,0.35)"/>
    <rect x="57" y="40" width="10" height="12" rx="1" fill="rgba(255,220,100,0.5)"/>
    <rect x="43" y="58" width="10" height="12" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="57" y="58" width="10" height="12" rx="1" fill="rgba(255,220,100,0.3)"/>
    <rect x="43" y="76" width="10" height="12" rx="1" fill="rgba(255,220,100,0.25)"/>
    <rect x="57" y="76" width="10" height="12" rx="1" fill="rgba(255,220,100,0.45)"/>
    <rect x="43" y="94" width="10" height="12" rx="1" fill="rgba(255,220,100,0.35)"/>
    <rect x="57" y="94" width="10" height="12" rx="1" fill="rgba(255,220,100,0.2)"/>
    <rect x="43" y="112" width="10" height="12" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="57" y="112" width="10" height="12" rx="1" fill="rgba(255,220,100,0.3)"/>
    <rect x="43" y="130" width="10" height="12" rx="1" fill="rgba(255,220,100,0.2)"/>
    <rect x="57" y="130" width="10" height="12" rx="1" fill="rgba(255,220,100,0.45)"/>
    <!-- Antenna -->
    <line x1="60" y1="30" x2="60" y2="10" stroke="url(#goldMain)" stroke-width="2"/>
    <circle cx="60" cy="8" r="3" fill="#f0c040" filter="url(#glow)"/>

    <!-- Building droit -->
    <rect x="88" y="65" width="36" height="115" fill="url(#goldBuilding)" opacity="0.75"/>
    <rect x="93" y="74" width="9" height="11" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="106" y="74" width="9" height="11" rx="1" fill="rgba(255,220,100,0.25)"/>
    <rect x="93" y="91" width="9" height="11" rx="1" fill="rgba(255,220,100,0.3)"/>
    <rect x="106" y="91" width="9" height="11" rx="1" fill="rgba(255,220,100,0.45)"/>
    <rect x="93" y="108" width="9" height="11" rx="1" fill="rgba(255,220,100,0.2)"/>
    <rect x="106" y="108" width="9" height="11" rx="1" fill="rgba(255,220,100,0.35)"/>
    <rect x="93" y="125" width="9" height="11" rx="1" fill="rgba(255,220,100,0.4)"/>
    <rect x="106" y="125" width="9" height="11" rx="1" fill="rgba(255,220,100,0.3)"/>
  </g>

  <!-- Car silhouette (sportive) -->
  <g transform="translate(370, 130)" opacity="0.8">
    <!-- Light trail -->
    <ellipse cx="60" cy="30" rx="90" ry="8" fill="none" stroke="url(#goldMain)" stroke-width="1.5" opacity="0.4"/>
    <!-- Car body -->
    <path d="M0,25 Q10,5 40,8 Q60,0 85,5 L100,15 L105,20 L105,30 L95,32 Q90,25 82,25 Q74,25 70,32 L40,32 Q35,25 27,25 Q19,25 15,32 L5,32 L0,28 Z"
          fill="url(#goldDark)" opacity="0.9"/>
    <!-- Windows -->
    <path d="M40,10 Q55,4 78,8 L85,15 L38,18 Z" fill="rgba(255,220,100,0.2)"/>
    <!-- Wheels -->
    <circle cx="27" cy="32" r="7" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="27" cy="32" r="3" fill="#333" stroke="#c9a84c" stroke-width="0.5"/>
    <circle cx="82" cy="32" r="7" fill="#1a1a1a" stroke="#c9a84c" stroke-width="1.5"/>
    <circle cx="82" cy="32" r="3" fill="#333" stroke="#c9a84c" stroke-width="0.5"/>
    <!-- Headlight glow -->
    <ellipse cx="108" cy="22" rx="12" ry="6" fill="#f0c040" opacity="0.15" filter="url(#softGlow)"/>
    <line x1="105" y1="22" x2="130" y2="18" stroke="#f0c040" stroke-width="1" opacity="0.3"/>
    <line x1="105" y1="22" x2="128" y2="22" stroke="#f0c040" stroke-width="1" opacity="0.25"/>
    <line x1="105" y1="24" x2="125" y2="28" stroke="#f0c040" stroke-width="0.8" opacity="0.2"/>
  </g>

  <!-- Sparkles / particles -->
  <circle cx="180" cy="100" r="1.5" fill="#f0c040" opacity="0.6" filter="url(#glow)"/>
  <circle cx="220" cy="75" r="1" fill="#d4af37" opacity="0.4"/>
  <circle cx="440" cy="90" r="1.2" fill="#f0c040" opacity="0.5"/>
  <circle cx="400" cy="120" r="0.8" fill="#ffe88a" opacity="0.3"/>
  <circle cx="195" cy="180" r="1" fill="#d4af37" opacity="0.4"/>
  <circle cx="480" cy="145" r="1.3" fill="#f0c040" opacity="0.5" filter="url(#glow)"/>

  <!-- EDEN text -->
  <text x="300" y="270" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="800" font-size="110" fill="url(#goldMain)" filter="url(#shadow)" letter-spacing="8">EDEN</text>

  <!-- GROUP text -->
  <text x="300" y="330" text-anchor="middle" font-family="'Playfair Display', 'Georgia', serif" font-weight="700" font-size="55" fill="url(#goldMain)" filter="url(#shadow)" letter-spacing="18">GROUP</text>

  <!-- Decorative lines around GROUP -->
  <line x1="130" y1="315" x2="210" y2="315" stroke="url(#goldMain)" stroke-width="1.5" opacity="0.7"/>
  <line x1="390" y1="315" x2="470" y2="315" stroke="url(#goldMain)" stroke-width="1.5" opacity="0.7"/>

  <!-- Center sparkle under lines -->
  <circle cx="300" cy="350" r="3" fill="#f0c040" filter="url(#glow)" opacity="0.8"/>
  <line x1="290" y1="350" x2="260" y2="350" stroke="#f0c040" stroke-width="0.5" opacity="0.3"/>
  <line x1="310" y1="350" x2="340" y2="350" stroke="#f0c040" stroke-width="0.5" opacity="0.3"/>
</svg>
